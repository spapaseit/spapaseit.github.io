<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sergi Papaseit</title>
  <meta name="description" content="Sergi Papaseit — Senior Full-Stack Software Engineer">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #1c1917;
      --color-text: #e7e5e4;
      --color-muted: #a8a29e;
      --color-accent: #60a5fa;
      --color-accent-hover: #93bbfd;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .home {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: var(--color-muted);
      font-size: 1rem;
      margin-top: 0.5rem;
    }

    .links {
      margin-top: 2rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--color-accent);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.15s;
    }

    .links a:hover {
      color: var(--color-accent-hover);
    }
  </style>
</head>
<body>
  <div class="home">
    <h1>Sergi Papaseit</h1>
    <p class="subtitle">Senior Full-Stack Software Engineer</p>
    <div class="links">
      <a href="/cv">CV</a>
      <a href="https://github.com/spapaseit">GitHub</a>
      <a href="https://linkedin.com/in/sergipapaseit">LinkedIn</a>
      <a href="mailto:sergi.papaseit.valls@gmail.com">Email</a>
    </div>
  </div>
</body>
</html>
