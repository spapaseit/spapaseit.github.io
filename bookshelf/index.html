<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookshelf — Sergi Papaseit</title>
  <meta name="description" content="Books I've loved and would recommend.">
  <link rel="stylesheet" href="../shared.css">
  <style>
    .book-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .book {
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--color-border);
    }

    .book:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .book-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--color-text);
    }

    .book-author {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-top: 0.1rem;
    }

    .book-note {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      margin-top: 0.35rem;
      line-height: 1.55;
    }

    .empty-note {
      color: var(--color-text-muted);
      font-size: 0.9rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <nav class="site-nav">

    </div>
  </nav>

  <div class="page">
    <h1>Bookshelf</h1>

    <h2>Software & Technology</h2>

        <p class="book-note"><!-- Optional: a line about why you liked it --></p>
      </li>
    </ul>
    <p class="empty-note">Coming soon — I need to dig through my shelves.</p>

    <h2>Non-Fiction</h2>
